# I should fix the deployment issue. There's an issue in this file that breaks before even calling the verification action.
name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # We can add zizmore for automatic checking on sha pinning.
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v7.x.x

      # GHCR requires lowercase image names — this repo has uppercase letters
      # (Dakshmulundkar/STANS), so we normalize it before using it as a tag.
      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v3.x.x
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get build date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      # We verify the image health before pushing into the repo
      # build-and-load locally, verify health, then push only if that passed
      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v.6.x.x
        with:
          context: .
          load: true
          build-args: |
            REVISION=${{ github.sha }}
            BUILD_DATE=${{ steps.date.outputs.date }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}

      - name: Verify image health before publishing
        run: |
          docker run -d --name ci-health-check -p 8080:80 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
          for i in $(seq 1 10); do
            if docker exec ci-health-check wget -q -O- http://127.0.0.1/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for container to become healthy... ($i/10)"
            sleep 3
          done
          echo "Health check failed after 10 attempts"
          docker logs ci-health-check
          exit 1

      - name: Clean up health-check container
        if: always()
        run:  docker rm -f ci-health-check || true

      # Every commit's image is preserved under its own :sha-<commit> tag in GHCR permanently (nothing deletes them)
      # and :latest can never point at a broken build.
      - name: Push verified image
        run:  |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest


