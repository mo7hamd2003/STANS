name: ci-workflow

on:
  push:
    branches: ['**']

jobs:
  build:
    name: Build & Validate
    runs-on:  ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache:  'npm'

      - name: Install dependencies
        run:  npm ci

      - name: Lint (only if lint script exists)
        run:  |
          if npm run | grep -q " lint"; then
            npm run lint
          else
            echo "No lint script found in package.json - skipping."
          fi

      - name: Build
        run:  npm run build