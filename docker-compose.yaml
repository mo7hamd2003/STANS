services:
  stans-app:
    build:
      context: .
      args:
        # Overridable at build time: docker compose build --build-arg REVISION=$(git rev-parse HEAD)
        REVISION: ${REVISION:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: ghcr.io/mo7hamd2003/stans:latest
    container_name: stans-app
    restart: unless-stopped
    ports:
      - "8080:80"
    # No explicit healthcheck block needed here — Compose automatically
    # inherits the HEALTHCHECK instruction already baked into the image
    # via the Dockerfile. `docker compose ps` will show (healthy)/(unhealthy)
    # the same way `docker ps` does.

